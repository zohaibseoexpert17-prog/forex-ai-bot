<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex AI Trading Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #334155;
        }
        h1 { color: #f8fafc; font-size: 28px; }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e293b;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .pulse {
            width: 10px; height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        .news-ticker {
            background: #1e293b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            white-space: nowrap;
        }
        .ticker-content {
            display: inline-block;
            animation: scroll 25s linear infinite;
            font-size: 14px;
            color: #94a3b8;
        }
        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .indicators {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .indicator {
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .indicator-name { color: #94a3b8; }
        .bull { color: #22c55e; }
        .bear { color: #ef4444; }
        .neutral { color: #f59e0b; }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 4px solid;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateX(5px); }
        .card.buy { border-left-color: #22c55e; }
        .card.sell { border-left-color: #ef4444; }
        .card.hold { border-left-color: #f59e0b; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .pair-name { font-size: 22px; font-weight: bold; color: #fff; }
        .badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
        }
        .badge-buy { background: rgba(34,197,94,0.2); color: #22c55e; }
        .badge-sell { background: rgba(239,68,68,0.2); color: #ef4444; }
        .badge-hold { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .prices {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .price-item { display: flex; flex-direction: column; }
        .price-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        .price-value { font-size: 17px; font-weight: 600; color: #fff; }
        .pos { color: #22c55e; }
        .neg { color: #ef4444; }
        .meter {
            height: 6px;
            background: #334155;
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }
        .fill-buy { background: #22c55e; }
        .fill-sell { background: #ef4444; }
        .fill-hold { background: #f59e0b; }
        .confidence { font-size: 12px; text-align: right; color: #94a3b8; }
        .reasons {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.7;
            color: #cbd5e1;
        }
        .reasons strong { color: #fff; }
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: #2563eb; }
        .refresh-btn:active { transform: scale(0.98); }
        .last-update { text-align: center; font-size: 12px; color: #64748b; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🤖 Forex AI Bot</h1>
                <p style="color:#94a3b8;font-size:14px;">Smart Trading Assistant</p>
            </div>
            <div class="status">
                <div class="pulse"></div>
                <span>Live Analysis</span>
            </div>
        </div>

        <div class="news-ticker">
            <div class="ticker-content" id="newsTicker"></div>
        </div>

        <div class="indicators" id="globalIndicators"></div>

        <div id="signalsContainer"></div>

        <button class="refresh-btn" onclick="refreshAnalysis()">🔄 Refresh Market Analysis</button>
        <div class="last-update" id="lastUpdate">Last updated: Just now</div>
    </div>

    <script>
        const pairs = [
            { name: 'EUR/USD', base: 'EUR', quote: 'USD', volatility: 0.4 },
            { name: 'GBP/USD', base: 'GBP', quote: 'USD', volatility: 0.5 },
            { name: 'USD/JPY', base: 'USD', quote: 'JPY', volatility: 0.3 },
            { name: 'USD/CHF', base: 'USD', quote: 'CHF', volatility: 0.35 },
            { name: 'AUD/USD', base: 'AUD', quote: 'USD', volatility: 0.6 },
            { name: 'USD/CAD', base: 'USD', quote: 'CAD', volatility: 0.45 },
            { name: 'NZD/USD', base: 'NZD', quote: 'USD', volatility: 0.7 },
            { name: 'GBP/JPY', base: 'GBP', quote: 'JPY', volatility: 0.8 }
        ];

        const newsHeadlines = [
            "🚨 Fed signals potential rate pause in next meeting",
            "📰 ECB inflation data beats expectations at 2.1%",
            "🚨 Bank of Japan maintains ultra-loose policy",
            "🚨 US NFP jobs report shows strong labor market",
            "📰 German manufacturing PMI falls to 48.2",
            "📰 Oil prices surge 3% on supply concerns",
            "📰 China trade surplus widens unexpectedly",
            "📰 UK retail sales decline for third month",
            "🚨 RBA hints at keeping rates higher for longer",
            "🚨 US Treasury yields climb to 4.35%"
        ];

        function getBasePrice(pair) {
            const bases = {
                'EUR/USD': 1.0850, 'GBP/USD': 1.2650, 'USD/JPY': 149.50,
                'USD/CHF': 0.8950, 'AUD/USD': 0.6650, 'USD/CAD': 1.3550,
                'NZD/USD': 0.6150, 'GBP/JPY': 189.00
            };
            return bases[pair] || 1.0;
        }

        function generateMarketData() {
            const data = {};
            pairs.forEach(pair => {
                const basePrice = getBasePrice(pair.name);
                const change = (Math.random() - 0.5) * pair.volatility * 100;
                const price = basePrice + (change / 10000);
                
                data[pair.name] = {
                    price: price,
                    change: change,
                    high: price + Math.random() * pair.volatility * 0.0005,
                    low: price - Math.random() * pair.volatility * 0.0005,
                    rsi: Math.floor(Math.random() * 60) + 20,
                    macd: (Math.random() - 0.5) * 0.5,
                    ema20: price * (1 + (Math.random() - 0.5) * 0.002),
                    ema50: price * (1 + (Math.random() - 0.5) * 0.005),
                    volume: Math.floor(Math.random() * 50000) + 10000
                };
            });
            return data;
        }

        function analyzeSignal(pairName, data) {
            const score = { buy: 0, sell: 0, hold: 0 };
            const reasons = [];

            if (data.rsi < 30) { 
                score.buy += 2; 
                reasons.push(`RSI oversold (${data.rsi}) - potential bounce up`); 
            }
            else if (data.rsi > 70) { 
                score.sell += 2; 
                reasons.push(`RSI overbought (${data.rsi}) - potential drop down`); 
            }
            else if (data.rsi < 45) { 
                score.buy += 1; 
                reasons.push(`RSI weak (${data.rsi}) - watch for reversal up`); 
            }
            else if (data.rsi > 55) { 
                score.sell += 1; 
                reasons.push(`RSI strong (${data.rsi}) - momentum up but may exhaust`); 
            }
            else { 
                score.hold += 1; 
                reasons.push(`RSI neutral (${data.rsi}) - no clear direction`); 
            }

            if (data.macd > 0.1) { 
                score.buy += 2; 
                reasons.push(`MACD bullish (${data.macd.toFixed(4)}) - momentum up`); 
            }
            else if (data.macd < -0.1) { 
                score.sell += 2; 
                reasons.push(`MACD bearish (${data.macd.toFixed(4)}) - momentum down`); 
            }
            else { 
                score.hold += 1; 
                reasons.push(`MACD flat (${data.macd.toFixed(4)}) - wait for crossover`); 
            }

            if (data.price > data.ema20 && data.ema20 > data.ema50) {
                score.buy += 2; 
                reasons.push(`Price above EMA20 & EMA50 - uptrend confirmed`);
            } 
            else if (data.price < data.ema20 && data.ema20 < data.ema50) {
                score.sell += 2; 
                reasons.push(`Price below EMA20 & EMA50 - downtrend confirmed`);
            } 
            else if (data.price > data.ema20) {
                score.buy += 1; 
                reasons.push(`Price above EMA20 but waiting for EMA50 cross`);
            } 
            else {
                score.sell += 1; 
                reasons.push(`Price below EMA20 - short-term weakness`);
            }

            if (data.change > 0.2) { 
                score.buy += 1; 
                reasons.push(`Strong green candle - buyers active`); 
            }
            else if (data.change < -0.2) { 
                score.sell += 1; 
                reasons.push(`Red candle - selling pressure`); 
            }

            if (data.volume > 40000) {
                if (data.change > 0) { 
                    score.buy += 1; 
                    reasons.push(`High volume on rise - big money buying`); 
                }
                else { 
                    score.sell += 1; 
                    reasons.push(`High volume on drop - big money selling`); 
                }
            }

            if (Math.random() > 0.7) {
                const impact = Math.random() > 0.5 ? 'buy' : 'sell';
                score[impact] += 1;
                reasons.push(`Recent ${impact === 'buy' ? 'bullish' : 'bearish'} news affecting market`);
            }

            let signal, confidence;
            if (score.buy > score.sell + 1) { 
                signal = 'BUY'; 
                confidence = Math.min(95, 60 + score.buy * 8); 
            }
            else if (score.sell > score.buy + 1) { 
                signal = 'SELL'; 
                confidence = Math.min(95, 60 + score.sell * 8); 
            }
            else { 
                signal = 'HOLD'; 
                confidence = Math.min(95, 50 + score.hold * 10); 
            }

            return { signal, confidence, reasons };
        }

        function renderNews() {
            const ticker = document.getElementById('newsTicker');
            const text = newsHeadlines.join(' &nbsp;&nbsp;•&nbsp;&nbsp; ');
            ticker.innerHTML = text + ' &nbsp;&nbsp;•&nbsp;&nbsp; ' + text;
        }

        function renderGlobalIndicators() {
            const indicators = [
                { name: 'DXY Index', value: (103 + Math.random() * 2).toFixed(2), trend: Math.random() > 0.5 ? 'bull' : 'bear' },
                { name: 'VIX Fear', value: (14 + Math.random() * 8).toFixed(2), trend: Math.random() > 0.7 ? 'bear' : 'neutral' },
                { name: 'Gold', value: (2300 + Math.random() * 50).toFixed(2), trend: Math.random() > 0.5 ? 'bull' : 'bear' },
                { name: 'US 10Y Yield', value: (4.2 + Math.random() * 0.3).toFixed(2) + '%', trend: Math.random() > 0.5 ? 'bull' : 'bear' },
                { name: 'Crude Oil', value: (78 + Math.random() * 5).toFixed(2), trend: Math.random() > 0.5 ? 'bull' : 'bear' },
                { name: 'Bitcoin', value: (65000 + Math.random() * 3000).toFixed(0), trend: Math.random() > 0.5 ? 'bull' : 'bear' }
            ];

            const container = document.getElementById('globalIndicators');
            container.innerHTML = indicators.map(ind => {
                const color = ind.trend === 'bull' ? 'bull' : ind.trend === 'bear' ? 'bear' : 'neutral';
                const arrow = ind.trend === 'bull' ? '▲' : ind.trend === 'bear' ? '▼' : '—';
                return `
                    <div class="indicator">
                        <span class="indicator-name">${ind.name}</span>
                        <span class="${color}">${ind.value} ${arrow}</span>
                    </div>
                `;
            }).join('');
        }

        function renderSignals() {
            const marketData = generateMarketData();
            const container = document.getElementById('signalsContainer');
            let html = '';

            pairs.forEach(pair => {
                const data = marketData[pair.name];
                const analysis = analyzeSignal(pair.name, data);

                const signalClass = analysis.signal.toLowerCase();
                const badgeClass = `badge-${analysis.signal.toLowerCase()}`;
                const fillClass = `fill-${analysis.signal.toLowerCase()}`;
                const changeClass = data.change >= 0 ? 'pos' : 'neg';
                const sign = data.change >= 0 ? '+' : '';

                html += `
                    <div class="card ${signalClass}">
                        <div class="card-header">
                            <span class="pair-name">${pair.name}</span>
                            <span class="badge ${badgeClass}">${analysis.signal}</span>
                        </div>
                        <div class="prices">
                            <div class="price-item">
                                <span class="price-label">Price</span>
                                <span class="price-value">${data.price.toFixed(5)}</span>
                            </div>
                            <div class="price-item">
                                <span class="price-label">Change</span>
                                <span class="price-value ${changeClass}">${sign}${data.change.toFixed(2)} pips</span>
                            </div>
                            <div class="price-item">
                                <span class="price-label">High</span>
                                <span class="price-value">${data.high.toFixed(5)}</span>
                            </div>
                            <div class="price-item">
                                <span class="price-label">Low</span>
                                <span class="price-value">${data.low.toFixed(5)}</span>
                            </div>
                            <div class="price-item">
                                <span class="price-label">RSI</span>
                                <span class="price-value">${data.rsi}</span>
                            </div>
                        </div>
                        <div class="meter">
                            <div class="meter-fill ${fillClass}" style="width: ${analysis.confidence}%"></div>
                        </div>
                        <div class="confidence">AI Confidence: ${analysis.confidence}%</div>
                        <div class="reasons">
                            <strong>Why ${analysis.signal}?</strong><br>
                            ${analysis.reasons.map(r => `• ${r}`).join('<br>')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function refreshAnalysis() {
            const btn = document.querySelector('.refresh-btn');
            btn.textContent = '⏳ Analyzing...';
            btn.disabled = true;

            setTimeout(() => {
                renderNews();
                renderGlobalIndicators();
                renderSignals();
                document.getElementById('lastUpdate').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
                btn.textContent = '🔄 Refresh Market Analysis';
                btn.disabled = false;
            }, 800);
        }

        renderNews();
        renderGlobalIndicators();
        renderSignals();
    </script>
</body>
</html>
