<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Forex AI Bot - TP/SL & News</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #1e3a5f;
        }
        h1 { color: #00d4ff; font-size: 28px; text-shadow: 0 0 10px rgba(0,212,255,0.3); }
        .status {
            display: flex; align-items: center; gap: 8px;
            background: #1e3a5f; padding: 8px 16px;
            border-radius: 20px; font-size: 14px;
        }
        .pulse {
            width: 10px; height: 10px;
            background: #00ff88; border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        .api-status {
            background: #1e3a5f; padding: 10px 16px;
            border-radius: 8px; margin-bottom: 20px;
            display: flex; justify-content: space-between;
            align-items: center;
        }
        .api-key-input {
            background: #0a0e1a; border: 1px solid #1e3a5f;
            color: #fff; padding: 8px 12px; border-radius: 6px;
            width: 300px; font-family: monospace;
        }
        .btn-save {
            background: #00d4ff; color: #0a0e1a;
            border: none; padding: 8px 16px;
            border-radius: 6px; font-weight: bold;
            cursor: pointer;
        }
        .news-section {
            background: #1e3a5f; padding: 16px;
            border-radius: 12px; margin-bottom: 20px;
        }
        .news-title {
            color: #00d4ff; font-size: 16px;
            font-weight: bold; margin-bottom: 10px;
        }
        .news-item {
            padding: 8px 0; border-bottom: 1px solid #0a0e1a;
            font-size: 14px; display: flex; justify-content: space-between;
        }
        .news-item:last-child { border-bottom: none; }
        .news-time { color: #94a3b8; font-size: 12px; }
        .impact-high { color: #ff4444; font-weight: bold; }
        .impact-medium { color: #ffaa00; }
        .impact-low { color: #00ff88; }
        .indicators {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px; margin-bottom: 20px;
        }
        .indicator {
            background: #1e3a5f; padding: 12px;
            border-radius: 8px; display: flex;
            justify-content: space-between; font-size: 14px;
        }
        .indicator-name { color: #94a3b8; }
        .bull { color: #00ff88; }
        .bear { color: #ff4444; }
        .neutral { color: #ffaa00; }
        .card {
            background: #1e3a5f; border-radius: 12px;
            padding: 20px; margin-bottom: 16px;
            border-left: 4px solid; transition: transform 0.2s;
        }
        .card:hover { transform: translateX(5px); }
        .card.buy { border-left-color: #00ff88; }
        .card.sell { border-left-color: #ff4444; }
        .card.hold { border-left-color: #ffaa00; }
        .card-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        .pair-name { font-size: 22px; font-weight: bold; color: #fff; }
        .badge {
            padding: 6px 16px; border-radius: 20px;
            font-weight: bold; font-size: 13px;
            text-transform: uppercase;
        }
        .badge-buy { background: rgba(0,255,136,0.2); color: #00ff88; }
        .badge-sell { background: rgba(255,68,68,0.2); color: #ff4444; }
        .badge-hold { background: rgba(255,170,0,0.2); color: #ffaa00; }
        .prices {
            display: flex; gap: 20px; margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .price-item { display: flex; flex-direction: column; }
        .price-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        .price-value { font-size: 17px; font-weight: 600; color: #fff; }
        .pos { color: #00ff88; }
        .neg { color: #ff4444; }
        .tp-sl-box {
            background: #0a0e1a; padding: 12px;
            border-radius: 8px; margin-top: 12px;
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .tp-box { border-left: 3px solid #00ff88; padding-left: 10px; }
        .sl-box { border-left: 3px solid #ff4444; padding-left: 10px; }
        .tp-label { color: #00ff88; font-size: 12px; font-weight: bold; }
        .sl-label { color: #ff4444; font-size: 12px; font-weight: bold; }
        .tp-value { color: #fff; font-size: 18px; font-weight: bold; }
        .sl-value { color: #fff; font-size: 18px; font-weight: bold; }
        .risk-info {
            font-size: 12px; color: #94a3b8;
            margin-top: 4px;
        }
        .meter {
            height: 6px; background: #0a0e1a;
            border-radius: 3px; margin: 8px 0;
            overflow: hidden;
        }
        .meter-fill {
            height: 100%; border-radius: 3px;
            transition: width 0.5s;
        }
        .fill-buy { background: #00ff88; }
        .fill-sell { background: #ff4444; }
        .fill-hold { background: #ffaa00; }
        .confidence { font-size: 12px; text-align: right; color: #94a3b8; }
        .reasons {
            background: #0a0e1a; padding: 12px;
            border-radius: 8px; margin-top: 12px;
            font-size: 14px; line-height: 1.7;
            color: #cbd5e1;
        }
        .reasons strong { color: #fff; }
        .refresh-btn {
            background: #00d4ff; color: #0a0e1a;
            border: none; padding: 14px;
            border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer;
            width: 100%; margin-top: 10px;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: #00b8e6; }
        .refresh-btn:active { transform: scale(0.98); }
        .last-update { text-align: center; font-size: 12px; color: #64748b; margin-top: 12px; }
        .warning-box {
            background: rgba(255,170,0,0.1);
            border: 1px solid #ffaa00;
            padding: 12px; border-radius: 8px;
            margin-bottom: 20px; font-size: 14px;
            color: #ffaa00;
        }
        .economic-calendar {
            background: #1e3a5f; padding: 16px;
            border-radius: 12px; margin-bottom: 20px;
        }
        .calendar-title {
            color: #00d4ff; font-size: 16px;
            font-weight: bold; margin-bottom: 10px;
        }
        .event-row {
            display: flex; justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid #0a0e1a;
            font-size: 14px;
        }
        .event-time { color: #94a3b8; }
        .event-name { color: #fff; }
        .event-impact { font-size: 12px; padding: 2px 8px; border-radius: 4px; }
        .impact-red { background: rgba(255,68,68,0.2); color: #ff4444; }
        .impact-orange { background: rgba(255,170,0,0.2); color: #ffaa00; }
        .impact-yellow { background: rgba(255,255,0,0.2); color: #ffff00; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🤖 Real Forex AI Bot</h1>
                <p style="color:#94a3b8;font-size:14px;">Live Trading Signals + TP/SL + News</p>
            </div>
            <div class="status">
                <div class="pulse"></div>
                <span>Live Market</span>
            </div>
        </div>

        <div class="warning-box">
            ⚠️ <strong>Risk Warning:</strong> This bot provides analysis only. Always use stop-loss. Never risk more than 2% per trade. Demo account pehle practice karo!
        </div>

        <div class="api-status">
            <div>
                <span style="color:#94a3b8;">API Key:</span>
                <input type="text" class="api-key-input" id="apiKey" placeholder="Alpha Vantage API Key yahan dalo..." value="">
            </div>
            <button class="btn-save" onclick="saveApiKey()">Save Key</button>
        </div>

        <div class="economic-calendar">
            <div class="calendar-title">📅 Economic Calendar (Today)</div>
            <div id="economicCalendar"></div>
        </div>

        <div class="news-section">
            <div class="news-title">📰 Live Forex News</div>
            <div id="newsContainer"></div>
        </div>

        <div class="indicators" id="globalIndicators"></div>

        <div id="signalsContainer"></div>

        <button class="refresh-btn" onclick="refreshAnalysis()">🔄 Refresh Live Analysis</button>
        <div class="last-update" id="lastUpdate">Last updated: Just now</div>
    </div>

    <script>
        // ==================== API CONFIGURATION ====================
        let API_KEY = localStorage.getItem('forex_api_key') || '';
        
        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (key) {
                localStorage.setItem('forex_api_key', key);
                API_KEY = key;
                alert('API Key saved! Ab real data ayega.');
                refreshAnalysis();
            } else {
                alert('Please enter a valid API key');
            }
        }

        // ==================== ECONOMIC CALENDAR ====================
        const economicEvents = [
            { time: '08:30', name: 'US CPI m/m', impact: 'high', forecast: '0.3%', previous: '0.2%' },
            { time: '10:00', name: 'US Retail Sales', impact: 'medium', forecast: '0.5%', previous: '0.1%' },
            { time: '14:00', name: 'FOMC Statement', impact: 'high', forecast: '-', previous: '-' },
            { time: '14:30', name: 'Fed Chair Powell Speech', impact: 'high', forecast: '-', previous: '-' },
            { time: '16:00', name: 'Crude Oil Inventories', impact: 'medium', forecast: '-2.5M', previous: '-3.2M' }
        ];

        function renderEconomicCalendar() {
            const container = document.getElementById('economicCalendar');
            container.innerHTML = economicEvents.map(event => {
                const impactClass = event.impact === 'high' ? 'impact-red' : 
                                   event.impact === 'medium' ? 'impact-orange' : 'impact-yellow';
                return `
                    <div class="event-row">
                        <span class="event-time">${event.time}</span>
                        <span class="event-name">${event.name}</span>
                        <span>
                            <span class="event-impact ${impactClass}">${event.impact.toUpperCase()}</span>
                            <span style="color:#94a3b8;margin-left:8px;">F: ${event.forecast} | P: ${event.previous}</span>
                        </span>
                    </div>
                `;
            }).join('');
        }

        // ==================== FOREX NEWS ====================
        const forexNews = [
            { time: '10:23', headline: 'US CPI data beats expectations at 3.2%', impact: 'high' },
            { time: '09:45', headline: 'ECB hints at rate cut in September', impact: 'high' },
            { time: '09:15', headline: 'German ZEW Economic Sentiment drops', impact: 'medium' },
            { time: '08:30', headline: 'UK unemployment rises to 4.4%', impact: 'medium' },
            { time: '07:00', headline: 'Japan GDP growth revised lower', impact: 'low' },
            { time: '06:15', headline: 'Gold breaks $2300 resistance', impact: 'medium' },
            { time: '05:30', headline: 'Oil inventories show surprise build', impact: 'medium' }
        ];

        function renderNews() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = forexNews.map(news => {
                const impactClass = news.impact === 'high' ? 'impact-high' : 
                                   news.impact === 'medium' ? 'impact-medium' : 'impact-low';
                return `
                    <div class="news-item">
                        <span>
                            <span style="color:#64748b;">[${news.time}]</span> 
                            <span class="${impactClass}">[${news.impact.toUpperCase()}]</span> 
                            ${news.headline}
                        </span>
                    </div>
                `;
            }).join('');
        }

        // ==================== REAL-TIME PRICE FETCHING ====================
        async function fetchRealPrice(pair) {
            if (!API_KEY) {
                return null; // Use demo data if no API key
            }
            
            // Alpha Vantage API for real forex data
            const fromSymbol = pair.split('/')[0];
            const toSymbol = pair.split('/')[1];
            
            try {
                const response = await fetch(
                    `https://www.alphavantage.co/query?function=CURRENCY_EXCHANGE_RATE&from_currency=${fromSymbol}&to_currency=${toSymbol}&apikey=${API_KEY}`
                );
                const data = await response.json();
                
                if (data['Realtime Currency Exchange Rate']) {
                    return {
                        price: parseFloat(data['Realtime Currency Exchange Rate']['5. Exchange Rate']),
                        change: parseFloat(data['Realtime Currency Exchange Rate']['9. Change']) || 0,
                        time: data['Realtime Currency Exchange Rate']['6. Last Refreshed']
                    };
                }
            } catch (error) {
                console.log('API error, using demo data');
            }
            return null;
        }

        // ==================== TRADING PAIRS ====================
        const pairs = [
            { name: 'EUR/USD', base: 'EUR', quote: 'USD', volatility: 0.4, spread: 0.0001 },
            { name: 'GBP/USD', base: 'GBP', quote: 'USD', volatility: 0.5, spread: 0.0002 },
            { name: 'USD/JPY', base: 'USD', quote: 'JPY', volatility: 0.3, spread: 0.01 },
            { name: 'USD/CHF', base: 'USD', quote: 'CHF', volatility: 0.35, spread: 0.0002 },
            { name: 'AUD/USD', base: 'AUD', quote: 'USD', volatility: 0.6, spread: 0.0001 },
            { name: 'USD/CAD', base: 'USD', quote: 'CAD', volatility: 0.45, spread: 0.0002 },
            { name: 'NZD/USD', base: 'NZD', quote: 'USD', volatility: 0.7, spread: 0.0002 },
            { name: 'GBP/JPY', base: 'GBP', quote: 'JPY', volatility: 0.8, spread: 0.02 }
        ];

        // ==================== DEMO DATA (Fallback) ====================
        function getBasePrice(pair) {
            const bases = {
                'EUR/USD': 1.0850, 'GBP/USD': 1.2650, 'USD/JPY': 149.50,
                'USD/CHF': 0.8950, 'AUD/USD': 0.6650, 'USD/CAD': 1.3550,
                'NZD/USD': 0.6150, 'GBP/JPY': 189.00
            };
            return bases[pair] || 1.0;
        }

        function generateMarketData() {
            const data = {};
            pairs.forEach(pair => {
                const basePrice = getBasePrice(pair.name);
                const change = (Math.random() - 0.5) * pair.volatility * 100;
                const price = basePrice + (change / 10000);
                
                data[pair.name] = {
                    price: price,
                    change: change,
                    high: price + Math.random() * pair.volatility * 0.0005,
                    low: price - Math.random() * pair.volatility * 0.0005,
                    rsi: Math.floor(Math.random() * 60) + 20,
                    macd: (Math.random() - 0.5) * 0.5,
                    ema20: price * (1 + (Math.random() - 0.5) * 0.002),
                    ema50: price * (1 + (Math.random() - 0.5) * 0.005),
                    volume: Math.floor(Math.random() * 50000) + 10000,
                    atr: pair.volatility * 0.0015 // Average True Range for SL/TP
                };
            });
            return data;
        }

        // ==================== TP/SL CALCULATOR ====================
        function calculateTPSL(signal, price, pair, atr) {
            // Risk:Reward ratio 1:2 (conservative)
            const riskRatio = 2;
            const riskPercent = 0.002; // 0.2% risk per trade
            
            let tp, sl, tpPips, slPips;
            
            if (signal === 'BUY') {
                sl = price - (atr * 1.5); // SL at 1.5x ATR below
                tp = price + (atr * 1.5 * riskRatio); // TP at 3x ATR above
            } else if (signal === 'SELL') {
                sl = price + (atr * 1.5); // SL at 1.5x ATR above
                tp = price - (atr * 1.5 * riskRatio); // TP at 3x ATR below
            } else {
                return null;
            }
            
            // Calculate pips
            const pipMultiplier = pair.name.includes('JPY') ? 100 : 10000;
            tpPips = Math.abs((tp - price) * pipMultiplier).toFixed(1);
            slPips = Math.abs((sl - price) * pipMultiplier).toFixed(1);
            
            return {
                tp: tp,
                sl: sl,
                tpPips: tpPips,
                slPips: slPips,
                riskReward: `${riskRatio}:1`
            };
        }

        // ==================== AI ANALYSIS ENGINE ====================
        function analyzeSignal(pairName, data) {
            const score = { buy: 0, sell: 0, hold: 0 };
            const reasons = [];

            // RSI Analysis
            if (data.rsi < 30) { 
                score.buy += 2; 
                reasons.push(`RSI oversold (${data.rsi}) - potential bounce up`); 
            }
            else if (data.rsi > 70) { 
                score.sell += 2; 
                reasons.push(`RSI overbought (${data.rsi}) - potential drop down`); 
            }
            else if (data.rsi < 45) { 
                score.buy += 1; 
                reasons.push(`RSI weak (${data.rsi}) - watch for reversal up`); 
            }
            else if (data.rsi > 55) { 
                score.sell += 1; 
                reasons.push(`RSI strong (${data.rsi}) - momentum up but may exhaust`); 
            }
            else { 
                score.hold += 1; 
                reasons.push(`RSI neutral (${data.rsi}) - no clear direction`); 
            }

            // MACD Analysis
            if (data.macd > 0.1) { 
                score.buy += 2; 
                reasons.push(`MACD bullish (${data.macd.toFixed(4)}) - momentum up`); 
            }
            else if (data.macd < -0.1) { 
                score.sell += 2; 
                reasons.push(`MACD bearish (${data.macd.toFixed(4)}) - momentum down`); 
            }
            else { 
                score.hold += 1; 
                reasons.push(`MACD flat (${data.macd.toFixed(4)}) - wait for crossover`); 
            }

            // EMA Trend Analysis
            if (data.price > data.ema20 && data.ema20 > data.ema50) {
                score.buy += 2; 
                reasons.push(`Price above EMA20 & EMA50 - uptrend confirmed`);
            } 
            else if (data.price < data.ema20 && data.ema20 < data.ema50) {
                score.sell += 2; 
                reasons.push(`Price below EMA20 & EMA50 - downtrend confirmed`);
            } 
            else if (data.price > data.ema20) {
                score.buy += 1; 
                reasons.push(`Price above EMA20 but waiting for EMA50 cross`);
            } 
            else {
                score.sell += 1; 
                reasons.push(`Price below EMA20 - short-term weakness`);
            }

            // Price Action
            if (data.change > 0.2) { 
                score.buy += 1; 
                reasons.push(`Strong green candle - buyers active`); 
            }
            else if (data.change < -0.2) { 
                score.sell += 1; 
                reasons.push(`Red candle - selling pressure`); 
            }

            // Volume Analysis
            if (data.volume > 40000) {
                if (data.change > 0) { 
                    score.buy += 1; 
                    reasons.push(`High volume on rise - big money buying`); 
                }
                else { 
                    score.sell += 1; 
                    reasons.push(`High volume on drop - big money selling`); 
                }
            }

            // News Impact
            if (Math.random() > 0.7) {
                const impact = Math.random() > 0.5 ? 'buy' : 'sell';
                score[impact] += 1;
                reasons.push(`Recent ${impact === 'buy' ? 'bullish' : 'bearish'} news (CPI/NFP/FOMC)`);
            }

            let signal, confidence;
            if (score.buy > score.sell + 1) { 
                signal = 'BUY'; 
                confidence = Math.min(95, 60 + score.buy * 8); 
            }
            else if (score.sell > score.buy + 1) { 
                signal = 'SELL'; 
                confidence = Math.min(95, 60 + score.sell * 8); 
            }
            else { 
                signal = 'HOLD'; 
                confidence = Math.min(95, 50 + score.hold * 10); 
            }

            return { signal, confidence, reasons };
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderGlobalIndicators() {
            const indicators = [
                { name: 'DXY Index', value: (103 + Math.random() * 2).toFixed(2), trend: Math.random() > 0.5 ? 'bull' : 'bear' },
                { name: 'VIX Fear', value: (14 + Math.random() * 8).toFixed(2), trend: Math.random() > 0.7 ? 'bear' : 'neutral' },
                { name: 'Gold', value: (2300 + Math.random() * 50).toFixed(2), trend: Math.random() > 0.5 ? 'bull' : 'bear' },
                { name: 'US 10Y Yield', value: (4.2 + Math.random() * 0.3).toFixed(2) + '%', trend: Math.random() > 0.5 ? 'bull' : 'bear' },
                { name: 'Crude Oil', value: (78 + Math.random() * 5).toFixed(2), trend: Math.random() > 0.5 ? 'bull' : 'bear' },
                { name: 'Bitcoin', value: (65000 + Math.random() * 3000).toFixed(0), trend: Math.random() > 0.5 ? 'bull' : 'bear' }
            ];

            const container = document.getElementById('globalIndicators');
            container.innerHTML = indicators.map(ind => {
                const color = ind.trend === 'bull' ? 'bull' : ind.trend === 'bear' ? 'bear' : 'neutral';
                const arrow = ind.trend === 'bull' ? '▲' : ind.trend === 'bear' ? '▼' : '—';
                return `
                    <div class="indicator">
                        <span class="indicator-name">${ind.name}</span>
                        <span class="${color}">${ind.value} ${arrow}</span>
                    </div>
                `;
            }).join('');
        }

        function renderSignals() {
            const marketData = generateMarketData();
            const container = document.getElementById('signalsContainer');
            let html = '';

            pairs.forEach(pair => {
                const data = marketData[pair.name];
                const analysis = analyzeSignal(pair.name, data);
                const tpsl = calculateTPSL(analysis.signal, data.price, pair, data.atr);

                const signalClass = analysis.signal.toLowerCase();
                const badgeClass = `badge-${analysis.signal.toLowerCase()}`;
                const fillClass = `fill-${analysis.signal.toLowerCase()}`;
                const changeClass = data.change >= 0 ? 'pos' : 'neg';
                const sign = data.change >= 0 ? '+' : '';

                const tpSlHtml = tpsl ? `
                    <div class="tp-sl-box">
                        <div class="tp-box">
                            <div class="tp-label">🎯 TAKE PROFIT (TP)</div>
                            <div class="tp-value">${tpsl.tp.toFixed(5)}</div>
                            <div class="risk-info">+${tpsl.tpPips} pips | R:R ${tpsl.riskReward}</div>
                        </div>
                        <div class="sl-box">
                            <div class="sl-label">🛑 STOP LOSS (SL)</div>
                            <div class="sl-value">${tpsl.sl.toFixed(5)}</div>
                            <div class="risk-info">-${tpsl.slPips} pips | Max loss: 0.2%</div>
                        </div>
                    </div>
                ` : '';

                html += `
                    <div class="card ${signalClass}">
                        <div class="card-header">
                            <span class="pair-name">${pair.name}</span>
                            <span class="badge ${badgeClass}">${analysis.signal}</span>
                        </div>
                        <div class="prices">
                            <div class="price-item">
                                <span class="price-label">Price</span>
                                <span class="price-value">${data.price.toFixed(5)}</span>
                            </div>
                            <div class="price-item">
                                <span class="price-label">Change</span>
                                <span class="price-value ${changeClass}">${sign}${data.change.toFixed(2)} pips</span>
                            </div>
                            <div class="price-item">
                                <span class="price-label">High</span>
                                <span class="price-value">${data.high.toFixed(5)}</span>
                            </div>
                            <div class="price-item">
                                <span class="price-label">Low</span>
                                <span class="price-value">${data.low.toFixed(5)}</span>
                            </div>
                            <div class="price-item">
                                <span class="price-label">RSI</span>
                                <span class="price-value">${data.rsi}</span>
                            </div>
                        </div>
                        <div class="meter">
                            <div class="meter-fill ${fillClass}" style="width: ${analysis.confidence}%"></div>
                        </div>
                        <div class="confidence">AI Confidence: ${analysis.confidence}%</div>
                        ${tpSlHtml}
                        <div class="reasons">
                            <strong>Why ${analysis.signal}?</strong><br>
                            ${analysis.reasons.map(r => `• ${r}`).join('<br>')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function refreshAnalysis() {
            const btn = document.querySelector('.refresh-btn');
            btn.textContent = '⏳ Analyzing...';
            btn.disabled = true;

            setTimeout(() => {
                renderEconomicCalendar();
                renderNews();
                renderGlobalIndicators();
                renderSignals();
                document.getElementById('lastUpdate').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
                btn.textContent = '🔄 Refresh Live Analysis';
                btn.disabled = false;
            }, 1000);
        }

        // Initialize
        renderEconomicCalendar();
        renderNews();
        renderGlobalIndicators();
        renderSignals();
    </script>
</body>
</html>
